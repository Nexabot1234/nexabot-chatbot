<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexaBot — Demo Store</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── Demo Storefront (just for show) ──────────────────────── -->
<header class="store-header">
  <div class="store-logo">⚡ NexaBot Demo Store</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Premium Wireless Headphones</h1>
  <p>48-hour battery. Studio-quality sound. $129 — free shipping.</p>
  <button class="btn-primary">Add to Cart — $129</button>
  <p class="stock-badge">✅ In stock — ships in 24 hours</p>
</section>

<section class="product-grid">
  <div class="product-card">
    <div class="product-img">🎧</div>
    <h3>Studio Pro</h3>
    <p>$129</p>
    <button>Add to Cart</button>
  </div>
  <div class="product-card">
    <div class="product-img">🎵</div>
    <h3>Sport Edition</h3>
    <p>$89</p>
    <button>Add to Cart</button>
  </div>
  <div class="product-card">
    <div class="product-img">🔊</div>
    <h3>Travel Max</h3>
    <p>$149</p>
    <button>Add to Cart</button>
  </div>
</section>

<!-- ── Chat Widget (live) ────────────────────────────────────── -->
<div id="nexabot-launcher" onclick="toggleChat()">
  <span>💬</span>
</div>

<div id="nexabot-window" class="nexabot-hidden">
  <div class="nexabot-header">
    <span>⚡ NexaBot</span>
    <button onclick="toggleChat()" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;">✕</button>
  </div>
  <div class="nexabot-messages" id="nexabot-messages">
    <div class="nexabot-bot-msg">
      Hi! I'm NexaBot 👋 — how can I help you today?
    </div>
  </div>
  <div class="nexabot-input-area">
    <input type="text" id="nexabot-input" placeholder="Type your message..." onkeypress="if(event.key==='Enter')sendMessage()" />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  // Load NexaBot config from window object
  const config = window.NEXABOT_CONFIG || {
    apiUrl: 'http://localhost:3000',
    storeName: 'NexaBot Demo Store',
    brandColor: '#00c3ff',
    position: 'bottom-right'
  };

  // Apply brand color
  document.documentElement.style.setProperty('--nexa-accent', config.brandColor || '#00c3ff');
  document.documentElement.style.setProperty('--nexa-position', config.position || 'bottom-right');

  function toggleChat() {
    const win = document.getElementById('nexabot-window');
    win.classList.toggle('nexabot-hidden');
  }

  function addMessage(text, sender) {
    const container = document.getElementById('nexabot-messages');
    const div = document.createElement('div');
    div.className = sender === 'user' ? 'nexabot-user-msg' : 'nexabot-bot-msg';
    div.textContent = text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  async function sendMessage() {
    const input = document.getElementById('nexabot-input');
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, 'user');
    input.value = '';

    try {
      const res = await fetch(`${config.apiUrl}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          context: { storeName: config.storeName }
        })
      });
      const data = await res.json();
      addMessage(data.response || 'Got it! Let me know if you need anything else.', 'bot');
    } catch {
      addMessage('Oops — something went wrong. Please try again.', 'bot');
    }
  }
</script>

</body>
</html>
